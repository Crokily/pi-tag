name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # The gateway ships platform-specific daemon/path code, so test the
        # full support matrix (Linux/macOS/Windows).
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: CLI smoke test
        run: node dist/cli/index.js help

      - name: Package dry-run
        run: npm pack --dry-run
